name: PR Checks

# Runs on every pull request targeting main
# Tests + build check + Trivy scan — no deploy
on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
  lint-and-test:
    name: "Lint & Test — ${{ matrix.service }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false               # Run all services even if one fails
      matrix:
        include:
          - service: user-service
            folder: user-services
          - service: product-service
            folder: product-service
          - service: order-service
            folder: order-service

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: "${{ matrix.folder }}/requirements.txt"

      - name: Install dependencies + linting tools
        run: |
          pip install -r ${{ matrix.folder }}/requirements.txt
          pip install pytest pytest-asyncio httpx ruff

      - name: Lint with ruff
        working-directory: ${{ matrix.folder }}
        run: |
          ruff check . --select E,W,F --ignore E501 || true
          # || true — warnings don't fail the PR, just report them

      - name: Run tests
        working-directory: ${{ matrix.folder }}
        env:
          DATABASE_URL: "sqlite:///./test.db"
          USER_SERVICE_URL: "http://localhost:8001"
          PRODUCT_SERVICE_URL: "http://localhost:8002"
        run: |
          if [ -d "tests" ]; then
            pytest tests/ -v --tb=short
          else
            python -c "import main; print('✓ ${{ matrix.service }} imports OK')"
          fi

  docker-build-check:
    name: "Docker build check — ${{ matrix.service }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: user-service
            folder: user-services
          - service: product-service
            folder: product-service
          - service: order-service
            folder: order-service

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # Build without pushing — just validates the Dockerfile works
      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.folder }}
          file: ./${{ matrix.folder }}/Dockerfile
          target: runtime
          push: false
          tags: ${{ matrix.service }}:pr-check
          cache-from: type=gha,scope=${{ matrix.service }}-pr
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}-pr
          load: true

      - name: Scan built image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ matrix.service }}:pr-check"
          format: "table"
          exit-code: "0"             # Warn but don't fail PRs for vulnerabilities
          ignore-unfixed: true
          severity: "HIGH,CRITICAL"