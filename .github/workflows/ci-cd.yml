name: ShopSphere CI/CD Pipeline

# ─────────────────────────────────────────────────────────────────────────────
# Triggers:
#   - Every push to main  →  full pipeline (test → build → scan → push → deploy)
#   - Every PR to main    →  test + build + scan only (no deploy)
#   - Manual trigger      →  full pipeline with optional image tag input
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag (defaults to git SHA)"
        required: false
        default: ""

env:
  AWS_REGION: ap-south-1
  EKS_CLUSTER: shopsphere-cluster
  K8S_NAMESPACE: shopsphere

  # ECR repo names — must match what Terraform created
  ECR_USER_SERVICE: shopsphere-user-service
  ECR_PRODUCT_SERVICE: shopsphere-product-service
  ECR_ORDER_SERVICE: shopsphere-order-service

  # Local folder names — matching YOUR repo exactly
  # user-services (with s) maps to ECR repo user-service
  FOLDER_USER: user-services
  FOLDER_PRODUCT: product-service
  FOLDER_ORDER: order-service
permissions:
  id-token: write
  contents: read
jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # JOB 1: Run tests for all 3 services in parallel
  # ───────────────────────────────────────────────────────────────────────────
  test:
    name: "Test — ${{ matrix.service }}"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: user-service
            folder: user-services
          - service: product-service
            folder: product-service
          - service: order-service
            folder: order-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: "${{ matrix.folder }}/requirements.txt"

      - name: Install dependencies
        run: |
          pip install -r ${{ matrix.folder }}/requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run tests
        working-directory: ${{ matrix.folder }}
        env:
          # Use SQLite for testing — no real DB needed in CI
          DATABASE_URL: "sqlite:///./test.db"
          USER_SERVICE_URL: "http://localhost:8001"
          PRODUCT_SERVICE_URL: "http://localhost:8002"
        run: |
          # Run tests if tests/ folder exists, otherwise do a basic import check
          if [ -d "tests" ]; then
            pytest tests/ -v --tb=short
          else
            echo "No tests/ folder yet — running import smoke test"
            python -c "import main; print('✓ ${{ matrix.service }} imports OK')"
          fi

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 2: Build images, scan with Trivy, push to ECR
  # Runs after tests pass, only on push to main (not on PRs)
  # ───────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: "Build, Scan & Push — ${{ matrix.service }}"
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: user-service
            folder: user-services
            ecr_repo: shopsphere-user-service
          - service: product-service
            folder: product-service
            ecr_repo: shopsphere-product-service
          - service: order-service
            folder: order-service
            ecr_repo: shopsphere-order-service

    # Output the image tag so the deploy job can use it
    outputs:
      image_tag: ${{ steps.set-tag.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Set image tag ──────────────────────────────────────────────────────
      # Use the first 7 chars of git SHA for traceability
      # e.g.  123456789012.dkr.ecr.ap-south-1.amazonaws.com/shopsphere-user-service:abc1234
      - name: Set image tag
        id: set-tag
        run: |
          if [ -n "${{ github.event.inputs.image_tag }}" ]; then
            TAG="${{ github.event.inputs.image_tag }}"
          else
            TAG="${{ github.sha }}"
            TAG="${TAG:0:7}"
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Image tag will be: ${TAG}"

      # ── Authenticate to AWS using OIDC (no long-lived keys needed) ─────────
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # ── Log in to ECR ──────────────────────────────────────────────────────
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ── Set up Docker Buildx for multi-platform builds ─────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Build the image ────────────────────────────────────────────────────
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.folder }}
          file: ./${{ matrix.folder }}/Dockerfile
          target: runtime
          platforms: linux/amd64 # EKS nodes are x86_64
          push: false # Don't push yet — scan first
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ matrix.ecr_repo }}:${{ steps.set-tag.outputs.tag }}
            ${{ steps.login-ecr.outputs.registry }}/${{ matrix.ecr_repo }}:latest
          # Cache layers from previous builds — speeds up rebuilds significantly
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          load: true # Load into local Docker for Trivy scanning

      # ── Scan with Trivy for CVEs ───────────────────────────────────────────
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ steps.login-ecr.outputs.registry }}/${{ matrix.ecr_repo }}:${{ steps.set-tag.outputs.tag }}"
          format: "table"
          exit-code: "1"
          ignore-unfixed: true
          severity: "HIGH,CRITICAL"
          output: "trivy-${{ matrix.service }}.txt"
          trivyignores: "${{ matrix.folder }}/.trivyignore"

      # ── Upload scan results as artifact ───────────────────────────────────
      - name: Upload Trivy scan results
        uses: actions/upload-artifact@v4
        if: always() # Upload even if scan found vulnerabilities
        with:
          name: trivy-results-${{ matrix.service }}
          path: trivy-${{ matrix.service }}.txt

      # ── Push to ECR (only if scan passed) ─────────────────────────────────
      - name: Push image to ECR
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.folder }}
          file: ./${{ matrix.folder }}/Dockerfile
          target: runtime
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ matrix.ecr_repo }}:${{ steps.set-tag.outputs.tag }}
            ${{ steps.login-ecr.outputs.registry }}/${{ matrix.ecr_repo }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      - name: Image pushed successfully
        run: |
          echo "✓ Pushed: ${{ steps.login-ecr.outputs.registry }}/${{ matrix.ecr_repo }}:${{ steps.set-tag.outputs.tag }}"

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 3 (optional): Manual approval gate before production deploy
  # Remove this job entirely if you want fully automatic deploys
  # ───────────────────────────────────────────────────────────────────────────
  approval:
    name: "Approval gate — deploy to EKS?"
    runs-on: ubuntu-latest
    needs: build-and-push
    environment:
      production # ← Create this in GitHub Settings → Environments
      #   Add required reviewers there
    steps:
      - name: Approved
        run: echo "Deploy approved — proceeding to EKS"

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 4: Deploy to EKS
  # ───────────────────────────────────────────────────────────────────────────
  deploy:
    name: "Deploy to EKS"
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Set the same image tag used during build ───────────────────────────
      - name: Resolve image tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.image_tag }}" ]; then
            TAG="${{ github.event.inputs.image_tag }}"
          else
            TAG="${{ github.sha }}"
            TAG="${TAG:0:7}"
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ── Connect kubectl to your EKS cluster ───────────────────────────────
      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name ${{ env.EKS_CLUSTER }} \
            --region ${{ env.AWS_REGION }}

      # ── Apply namespace, configmap, secret first ───────────────────────────
      - name: Apply base config
        run: |
          kubectl apply -f k8s/base/namespace.yaml
          kubectl apply -f k8s/base/configmap.yaml
          # Note: secret.yaml is applied manually once (contains real DB password)
          # Do not apply it in CI — manage via AWS Secrets Manager in Step 7

      # ── Update each deployment image to the new SHA tag ───────────────────
      # kubectl set image is safer than sed-editing YAML in CI
      - name: Deploy user-service
        run: |
          IMAGE="${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_USER_SERVICE }}:${{ steps.tag.outputs.tag }}"
          kubectl set image deployment/user-services \
            user-services=${IMAGE} \
            -n ${{ env.K8S_NAMESPACE }}
          kubectl rollout status deployment/user-services \
            -n ${{ env.K8S_NAMESPACE }} --timeout=120s

      - name: Deploy product-service
        run: |
          IMAGE="${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_PRODUCT_SERVICE }}:${{ steps.tag.outputs.tag }}"
          kubectl set image deployment/product-service \
            product-service=${IMAGE} \
            -n ${{ env.K8S_NAMESPACE }}
          kubectl rollout status deployment/product-service \
            -n ${{ env.K8S_NAMESPACE }} --timeout=120s

      - name: Deploy order-service
        run: |
          IMAGE="${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_ORDER_SERVICE }}:${{ steps.tag.outputs.tag }}"
          kubectl set image deployment/order-service \
            order-service=${IMAGE} \
            -n ${{ env.K8S_NAMESPACE }}
          kubectl rollout status deployment/order-service \
            -n ${{ env.K8S_NAMESPACE }} --timeout=120s

      # ── Apply HPA (idempotent — safe to reapply) ──────────────────────────
      - name: Apply HPA
        run: kubectl apply -f k8s/base/hpa.yaml

      # ── Verify all pods are running ────────────────────────────────────────
      - name: Verify deployment
        run: |
          echo "── Pods ──────────────────────────────────────"
          kubectl get pods -n ${{ env.K8S_NAMESPACE }}
          echo "── Services ──────────────────────────────────"
          kubectl get services -n ${{ env.K8S_NAMESPACE }}
          echo "── Ingress (ALB URL) ─────────────────────────"
          kubectl get ingress -n ${{ env.K8S_NAMESPACE }}

      # ── Post the ALB URL as a summary in the Actions tab ──────────────────
      - name: Post deployment summary
        run: |
          ALB=$(kubectl get ingress shopsphere-ingress \
            -n ${{ env.K8S_NAMESPACE }} \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || echo "provisioning")

          TAG="${{ steps.tag.outputs.tag }}"
          SHA="${{ github.sha }}"

          echo "## ✅ Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Image tag | \`${TAG}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Git SHA | \`${SHA}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| ALB URL | http://${ALB} |" >> $GITHUB_STEP_SUMMARY
          echo "| Namespace | ${{ env.K8S_NAMESPACE }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Quick test" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "curl http://${ALB}/health" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
